# NeuraWealth OS — Docker Compose
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up -d   # start all services
#   docker compose logs -f # follow logs

services:
  # ─── Full-Stack App (Frontend + API Server) ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neurawealth-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Telegram Bot (Python) ─────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: neurawealth-bot
    restart: unless-stopped
    env_file: ./bot/.env
    depends_on:
      app:
        condition: service_healthy
